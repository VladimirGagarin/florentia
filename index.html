<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florentia App Landing Page</title>
    <style>
        body {
            background-color: #1A2A2E;
            color: white;
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
            margin-top: 50px;
        }
        .cta-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .button {
            background-color: #7B2CBF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .link {
            color: #FFD700;
            text-decoration: none;
        }
        .topics {
            margin: 40px;
            text-align: center;
        }
        .topic {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Welcome to Florentia</h1>
    <p>Where Thoughts Bloom and Conversation Flourish</p>
    <div class="topics">
        <h2>Topics of Conversation:</h2>
        <div class="topic">Philosophy</div>
        <div class="topic">Psychology</div>
        <div class="topic">Debatable Questions</div>
        <div class="topic">Romantic Lines</div>
        <div class="topic">Social Topics</div>
        <div class="topic">Creative Interests</div>
    </div>
    <div class="cta-buttons">
        <button class="button">Download APK</button>
        <a href="#" class="link">Access Online Version</a>
    </div>
</body>
</html>
